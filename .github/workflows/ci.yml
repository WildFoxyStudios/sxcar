name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  backend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    services:
      postgres:
        image: postgis/postgis:16-3.4
        env:
          POSTGRES_USER: dev
          POSTGRES_PASSWORD: dev
          POSTGRES_DB: appdb
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U dev -d appdb"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
    env:
      TEST_DATABASE_URL: postgres://dev:dev@localhost:5432/appdb
      SQLX_OFFLINE: "true"
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: backend
      - name: Format check
        run: cargo fmt --all -- --check
      - name: Clippy
        run: cargo clippy --all-targets -- -D warnings
      - name: Run migrations (compila offline desde .sqlx; migra la DB del service)
        env:
          DATABASE_URL: postgres://dev:dev@localhost:5432/appdb
        run: cargo run --bin api migrate
      - name: Verify sqlx cache is up to date
        env:
          DATABASE_URL: postgres://dev:dev@localhost:5432/appdb
          SQLX_OFFLINE: "false"
        run: |
          cargo install sqlx-cli --no-default-features --features rustls,postgres --locked
          cargo sqlx prepare --workspace --check
      - name: Tests
        run: cargo test --all
      - name: Security audit
        run: |
          cargo install cargo-audit --locked
          # Ignore RUSTSEC-2023-0071 only: `rsa` is a Cargo.lock-only entry via
          # sqlx's unused optional MySQL driver; not in our build graph. See backend/audit.toml.
          cargo audit --ignore RUSTSEC-2023-0071
